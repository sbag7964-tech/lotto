name: Daily SEO Page

on:
  schedule:
    # 매일 00:15 UTC = KST 09:15
    - cron: "15 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate SEO page + sitemap
        run: node scripts/generate_seo_pages.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seo sitemap.xml
          git diff --cached --quiet || git commit -m "chore: daily seo page"
          git push
